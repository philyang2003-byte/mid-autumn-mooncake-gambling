<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8" />
<title>中秋博饼 · Mooncake Dice</title>
<meta name="viewport" content="width=1440" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=ZCOOL+KuaiLe&family=Noto+Serif+SC:wght@400;500;700;900&family=Noto+Sans+SC:wght@300;400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --ink-0:#07090F;      /* deepest ink */
    --ink-1:#0B1222;      /* deep indigo */
    --ink-2:#121B33;      /* indigo */
    --ink-3:#1A2442;
    --gold-1:#E8C26A;     /* bright gold */
    --gold-2:#D4A84B;     /* gold */
    --gold-3:#9C7A2E;     /* dark gold */
    --red-1:#E23A3F;
    --red-2:#C8282C;      /* cinnabar */
    --red-3:#8E1A1E;      /* dark red */
    --red-4:#5A0F12;      /* deepest red */
    --orange:#E8823A;
    --cream:#F5E7C8;
    --paper:#EFE3C3;
  }

  html,body{background:#07090F;color:var(--cream);margin:0;padding:0;font-family:"Noto Sans SC",sans-serif;}
  body{
    min-height:100vh;
    background:
      radial-gradient(ellipse at 20% 10%, rgba(60,80,130,.25), transparent 55%),
      radial-gradient(ellipse at 85% 85%, rgba(130,50,40,.18), transparent 55%),
      radial-gradient(ellipse at 50% 40%, #13213f 0%, #0a1024 45%, #07090F 100%);
    overflow-x:hidden;
  }

  /* subtle silk/paper noise overlay */
  body::before{
    content:"";position:fixed;inset:0;pointer-events:none;z-index:1;
    background-image:
      repeating-linear-gradient(135deg, rgba(255,255,255,.015) 0 1px, transparent 1px 3px),
      repeating-linear-gradient(45deg, rgba(0,0,0,.03) 0 1px, transparent 1px 2px);
    mix-blend-mode:overlay;
  }

  #app{position:relative;z-index:2;}
</style>
</head>
<body>
  <div id="app"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="./components/Background.jsx"></script>
  <script type="text/babel" src="./components/Bowl.jsx"></script>
  <script type="text/babel" src="./components/Dice.jsx"></script>
  <script type="text/babel" src="./components/PlayerRing.jsx"></script>
  <script type="text/babel" src="./components/CreatePanel.jsx"></script>

  <script type="text/babel" src="./components/PrizePanel.jsx"></script>
  <script type="text/babel" src="./components/Logic.jsx"></script>
  <script type="text/babel" src="./components/App.jsx"></script>
</body>
</html>
